<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Twilio Verify'">Twilio Verify</title>
    <link rel="stylesheet" href="https://assets.twilio.com/public_assets/paste-fonts/1.5.2/fonts.css">
    <link rel="stylesheet" th:href="@{/css/paste.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@24.0.0/build/css/intlTelInput.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a th:href="@{/}" class="logo">Twilio Verify</a>
            <nav class="nav">
                <span sec:authorize="isAuthenticated()" class="nav-text" sec:authentication="name"></span>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-secondary btn-small">Logout</button>
                </form>
                <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn-secondary btn-small">Login</a>
                <a sec:authorize="isAnonymous()" th:href="@{/register}" class="btn btn-primary btn-small">Register</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <section layout:fragment="content"></section>
        </div>
    </main>

    <footer class="footer">
        <p>Powered by Twilio Verify API</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@24.0.0/build/js/intlTelInput.min.js"></script>
    <section layout:fragment="scripts"></section>
</body>
</html>
