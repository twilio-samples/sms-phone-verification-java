<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Twilio Verify</title>
    <link rel="stylesheet" href="https://assets.twilio.com/public_assets/paste-fonts/1.5.2/fonts.css">
    <link rel="stylesheet" th:href="@{/css/paste.css}">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a th:href="@{/}" class="logo">Twilio Verify</a>
            <nav class="nav">
                <span class="nav-text" th:text="${user.username}"></span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-secondary btn-small">Logout</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="card">
                <h1 class="card-title">Phone Verified!</h1>
                <div class="alert alert-success">
                    <strong>Success!</strong> Your phone number has been verified.
                </div>
                <p>Congratulations! You have successfully verified your phone number and can now access secure content.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Powered by Twilio Verify API</p>
    </footer>
</body>
</html>
